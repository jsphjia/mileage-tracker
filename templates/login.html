<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — Mileage Tracker</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f8f9fa; }
    .auth-card { max-width: 420px; margin: 80px auto; }
  </style>
</head>
<body>
  <nav class="navbar" style="background-color:#007bff;">
    <div class="container-fluid">
      <span class="navbar-brand text-white fw-bold fs-4">Mileage Tracker</span>
    </div>
  </nav>

  <div class="auth-card card shadow-sm p-4">
    <h4 class="mb-4 text-center">Sign In</h4>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
          {{ message }}
          <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
      {% endfor %}
    {% endwith %}

    <form method="POST" action="/login">
      <div class="mb-3">
        <label for="email" class="form-label fw-semibold">Email</label>
        <input type="email" id="email" name="email" class="form-control" required autofocus>
      </div>
      <div class="mb-3">
        <label for="password" class="form-label fw-semibold">Password</label>
        <input type="password" id="password" name="password" class="form-control" required>
      </div>
      <button type="submit" class="btn btn-primary w-100 mt-1">Sign In</button>
    </form>

    <hr>
    <p class="text-center mb-0 text-muted small">
      Don't have an account? <a href="/register">Create one</a>
    </p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
