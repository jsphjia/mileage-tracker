<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mileage Tracker</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
  <link rel="apple-touch-icon" href="/static/apple-touch-icon.png">
  <link rel="manifest" href="/static/manifest.json">
  <meta name="theme-color" content="#4F46E5">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --primary:    #4F46E5;
      --violet:     #7C3AED;
      --grad:       linear-gradient(135deg, #4F46E5 0%, #7C3AED 100%);
      --bg:         #F1F5F9;
      --surface:    #FFFFFF;
      --text:       #0F172A;
      --muted:      #64748B;
      --border:     #E2E8F0;
      --radius:     16px;
      --radius-sm:  10px;
      --shadow:     0 1px 3px rgba(0,0,0,.06), 0 4px 16px rgba(79,70,229,.08);
    }

    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Navbar ─────────────────────────────── */
    .app-nav {
      background: var(--grad);
      padding: 0 24px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 16px rgba(79,70,229,.3);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .nav-brand {
      display: flex; align-items: center; gap: 10px;
      color: white; font-weight: 700; font-size: 1.05rem; text-decoration: none;
    }
    .nav-logo {
      width: 34px; height: 34px; border-radius: 8px;
      background: rgba(255,255,255,.2);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.95rem;
    }
    .nav-right { display: flex; align-items: center; gap: 10px; }
    .user-chip {
      display: flex; align-items: center; gap: 8px;
      background: rgba(255,255,255,.15); border-radius: 20px;
      padding: 4px 12px 4px 4px;
      color: white; font-size: 0.83rem;
    }
    .user-avatar {
      width: 28px; height: 28px; border-radius: 50%;
      background: rgba(255,255,255,.3);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.72rem; font-weight: 700; color: white;
    }
    .logout-link {
      color: rgba(255,255,255,.8); font-size: 0.82rem;
      text-decoration: none; padding: 5px 10px; border-radius: 6px;
      transition: background .2s;
    }
    .logout-link:hover { background: rgba(255,255,255,.15); color: white; }

    /* ── Layout ─────────────────────────────── */
    .page { max-width: 680px; margin: 0 auto; padding: 32px 16px 56px; }

    /* ── Cards ──────────────────────────────── */
    .panel {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 28px;
      margin-bottom: 20px;
    }
    .panel-heading {
      display: flex; align-items: center; gap: 10px;
      font-size: 1rem; font-weight: 600; color: var(--text);
      margin-bottom: 22px;
    }
    .panel-heading-icon {
      width: 32px; height: 32px; border-radius: 8px;
      background: linear-gradient(135deg, #EEF2FF, #DDD6FE);
      display: flex; align-items: center; justify-content: center;
      color: var(--primary); font-size: 0.8rem;
    }

    /* ── Location inputs ─────────────────────── */
    .field-label {
      display: block; font-size: 0.74rem; font-weight: 600;
      color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em;
      margin-bottom: 6px;
    }
    .autocomplete-wrapper { position: relative; }
    .input-row {
      display: flex; border-radius: var(--radius-sm);
      border: 1.5px solid var(--border); overflow: hidden;
      transition: border-color .2s, box-shadow .2s;
    }
    .input-row:focus-within {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(79,70,229,.12);
    }
    .loc-icon {
      display: flex; align-items: center; padding: 0 13px;
      background: #F8FAFC; border-right: 1.5px solid var(--border);
      color: var(--muted); font-size: 0.7rem; flex-shrink: 0;
    }
    .loc-input {
      flex: 1; border: none; outline: none;
      padding: 12px 14px; background: transparent;
      font-family: 'Inter', sans-serif; font-size: 0.88rem; color: var(--text);
    }
    .loc-input::placeholder { color: #CBD5E1; }
    .loc-input.is-valid { background: #F0FDF4; }
    .mic-btn {
      border: none; border-left: 1.5px solid var(--border);
      background: transparent; padding: 0 13px;
      color: var(--muted); cursor: pointer; font-size: 0.82rem;
      transition: all .2s; flex-shrink: 0;
    }
    .mic-btn:hover { background: #F8FAFC; color: var(--primary); }
    .mic-btn.recording { background: #FEF2F2; color: #EF4444; }
    .mic-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Autocomplete dropdown ───────────────── */
    .autocomplete-dropdown {
      position: absolute; top: calc(100% + 3px); left: 0; right: 0; z-index: 200;
      background: white; border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      box-shadow: 0 8px 24px rgba(0,0,0,.1);
      max-height: 210px; overflow-y: auto;
    }
    .autocomplete-item {
      padding: 9px 14px; cursor: pointer; font-size: 0.85rem; color: var(--text);
      display: flex; align-items: center; gap: 8px;
      border-bottom: 1px solid #F8FAFC;
    }
    .autocomplete-item:last-child { border-bottom: none; }
    .autocomplete-item::before {
      content: '\f3c5'; font-family: 'Font Awesome 6 Free'; font-weight: 900;
      color: #CBD5E1; font-size: 0.7rem; flex-shrink: 0;
    }
    .autocomplete-item:hover, .autocomplete-item.active {
      background: #F1F5F9; color: var(--primary);
    }
    .autocomplete-item:hover::before, .autocomplete-item.active::before { color: var(--primary); }

    /* ── Route connector ─────────────────────── */
    .route-divider {
      display: flex; align-items: center; gap: 10px;
      margin: 10px 0; color: #CBD5E1; font-size: 0.75rem;
    }
    .route-divider::before, .route-divider::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }

    /* ── Voice confirm bar ───────────────────── */
    .confirm-bar {
      display: none; align-items: center; gap: 8px;
      padding: 8px 12px; margin-top: 6px;
      background: #FFFBEB; border: 1.5px solid #FCD34D;
      border-radius: 8px; font-size: 0.8rem;
    }
    .confirm-bar.show { display: flex; }
    .confirm-text { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: #92400E; }
    .confirm-yes, .confirm-edit {
      padding: 3px 10px; border-radius: 6px; font-size: 0.77rem;
      font-weight: 600; cursor: pointer; border: none; white-space: nowrap;
      transition: background .15s;
    }
    .confirm-yes { background: #D1FAE5; color: #065F46; }
    .confirm-yes:hover { background: #A7F3D0; }
    .confirm-edit { background: white; color: var(--muted); border: 1px solid var(--border); }
    .confirm-edit:hover { background: var(--bg); }

    /* ── Calculate button ────────────────────── */
    .btn-calc {
      width: 100%; margin-top: 20px; padding: 13px;
      background: var(--grad); border: none; border-radius: var(--radius-sm);
      color: white; font-weight: 600; font-size: 0.93rem;
      font-family: 'Inter', sans-serif; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: opacity .2s, transform .1s;
    }
    .btn-calc:hover { opacity: 0.92; }
    .btn-calc:active { transform: scale(0.99); }
    .btn-calc:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    /* ── Result panel ────────────────────────── */
    #resultPanel {
      margin-top: 16px; padding: 20px 22px;
      background: linear-gradient(135deg, #EEF2FF 0%, #F5F3FF 100%);
      border: 1.5px solid #C7D2FE; border-radius: var(--radius-sm);
    }
    .result-label {
      font-size: 0.72rem; font-weight: 600; color: var(--primary);
      text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px;
    }
    .result-number { font-size: 2.8rem; font-weight: 700; color: var(--primary); line-height: 1; }
    .result-unit { font-size: 1.1rem; font-weight: 500; color: #818CF8; }
    .result-route { font-size: 0.8rem; color: var(--muted); margin-top: 6px; }
    .btn-log {
      width: 100%; margin-top: 14px; padding: 11px;
      background: #ECFDF5; border: 1.5px solid #6EE7B7;
      border-radius: var(--radius-sm); color: #065F46;
      font-weight: 600; font-size: 0.88rem; font-family: 'Inter', sans-serif;
      cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 7px;
      transition: background .15s;
    }
    .btn-log:hover { background: #D1FAE5; }
    .btn-log:disabled { opacity: 0.6; cursor: not-allowed; }

    /* ── Alerts ──────────────────────────────── */
    .alert-strip {
      display: flex; align-items: center; gap: 10px;
      padding: 11px 14px; border-radius: var(--radius-sm);
      font-size: 0.86rem; margin-top: 14px;
    }
    .alert-err { background: #FEF2F2; border: 1.5px solid #FECACA; color: #7F1D1D; }
    .alert-ok  { background: #F0FDF4; border: 1.5px solid #BBF7D0; color: #14532D; }
    .alert-close {
      margin-left: auto; background: none; border: none; cursor: pointer;
      color: inherit; opacity: 0.6; padding: 0; font-size: 0.85rem;
    }
    .alert-close:hover { opacity: 1; }

    /* ── Stats bar ───────────────────────────── */
    .stats-bar {
      background: var(--surface); border-radius: var(--radius);
      box-shadow: var(--shadow); padding: 20px 28px;
      margin-bottom: 20px; display: flex; align-items: center;
    }
    .stat-item { flex: 1; text-align: center; }
    .stat-value { font-size: 2rem; font-weight: 700; color: var(--primary); line-height: 1; }
    .stat-label {
      font-size: 0.7rem; font-weight: 600; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.06em; margin-top: 5px;
    }
    .stat-divider { width: 1px; height: 44px; background: var(--border); flex-shrink: 0; }

    /* ── History ─────────────────────────────── */
    .history-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .export-btns { display: flex; gap: 6px; }
    .export-btn {
      display: flex; align-items: center; gap: 5px;
      padding: 5px 10px; border-radius: 8px; border: 1.5px solid var(--border);
      background: white; color: var(--muted); font-size: 0.78rem; font-weight: 600;
      cursor: pointer; font-family: 'Inter', sans-serif; transition: all .15s;
      white-space: nowrap;
    }
    .export-btn:hover { border-color: var(--primary); color: var(--primary); background: #EEF2FF; }
    @media (max-width: 480px) { .export-label { display: none; } }
    .trips-header {
      display: grid; grid-template-columns: 1fr 1fr 72px 116px 68px;
      gap: 8px; padding-bottom: 8px;
      font-size: 0.72rem; font-weight: 600; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.05em;
      border-bottom: 1.5px solid var(--border);
    }
    .trip-row {
      display: grid; grid-template-columns: 1fr 1fr 72px 116px 68px;
      gap: 8px; align-items: center; padding: 11px 0;
      border-bottom: 1px solid var(--border); font-size: 0.85rem;
    }
    .trip-row:last-child { border-bottom: none; }
    .trip-loc { color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .trip-mi  { font-weight: 700; color: var(--primary); }
    .trip-date { color: var(--muted); font-size: 0.78rem; }
    .trip-actions { display: flex; gap: 4px; align-items: center; }
    .trip-del, .trip-edit {
      width: 30px; height: 30px; border-radius: 7px;
      background: transparent; border: none; color: #CBD5E1;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      font-size: 0.78rem; transition: all .2s;
    }
    .trip-del:hover  { background: #FEF2F2; color: #EF4444; }
    .trip-edit:hover { background: #EEF2FF; color: var(--primary); }

    /* ── Edit modal ──────────────────────────────── */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.45); z-index: 500;
      align-items: center; justify-content: center; padding: 16px;
    }
    .modal-overlay.open { display: flex; }
    .modal-box {
      background: white; border-radius: var(--radius);
      box-shadow: 0 20px 60px rgba(0,0,0,.2);
      width: 100%; max-width: 460px; padding: 28px;
    }
    .modal-header {
      display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px;
    }
    .modal-title { font-size: 1.05rem; font-weight: 700; color: var(--text); display: flex; align-items: center; gap: 8px; }
    .modal-close {
      width: 32px; height: 32px; border-radius: 8px; background: none; border: none;
      color: var(--muted); cursor: pointer; font-size: 1rem;
      display: flex; align-items: center; justify-content: center; transition: background .15s;
    }
    .modal-close:hover { background: var(--bg); }
    .modal-field { margin-bottom: 14px; }
    .modal-field label { display: block; font-size: .73rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 6px; }
    .modal-field input {
      width: 100%; padding: 11px 14px;
      border: 1.5px solid var(--border); border-radius: var(--radius-sm);
      font-family: 'Inter', sans-serif; font-size: .9rem; color: var(--text);
      outline: none; transition: border-color .2s, box-shadow .2s;
    }
    .modal-field input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79,70,229,.12); }
    .modal-dist-row { display: flex; align-items: center; gap: 10px; margin-bottom: 22px; }
    .modal-miles-box {
      flex: 1; padding: 11px 14px; background: #F8FAFC;
      border: 1.5px solid var(--border); border-radius: var(--radius-sm);
      font-weight: 700; color: var(--primary); font-size: .9rem;
    }
    .btn-recalc {
      padding: 10px 14px; border-radius: var(--radius-sm);
      border: 1.5px solid var(--border); background: white;
      color: var(--muted); font-size: .82rem; font-weight: 600;
      cursor: pointer; font-family: 'Inter', sans-serif;
      display: flex; align-items: center; gap: 6px; transition: all .15s; white-space: nowrap;
    }
    .btn-recalc:hover { border-color: var(--primary); color: var(--primary); }
    .btn-recalc:disabled { opacity: .6; cursor: not-allowed; }
    .modal-footer { display: flex; gap: 10px; justify-content: flex-end; }
    .btn-modal-cancel {
      padding: 10px 18px; border-radius: var(--radius-sm);
      border: 1.5px solid var(--border); background: white;
      color: var(--muted); font-size: .88rem; font-weight: 600;
      cursor: pointer; font-family: 'Inter', sans-serif; transition: background .15s;
    }
    .btn-modal-cancel:hover { background: var(--bg); }
    .btn-modal-save {
      padding: 10px 20px; border-radius: var(--radius-sm);
      background: var(--grad); border: none; color: white;
      font-size: .88rem; font-weight: 600; cursor: pointer;
      font-family: 'Inter', sans-serif; transition: opacity .15s;
    }
    .btn-modal-save:hover { opacity: .9; }
    .btn-modal-save:disabled { opacity: .6; cursor: not-allowed; }
    .history-empty {
      text-align: center; padding: 44px 0; color: var(--muted); font-size: 0.9rem;
    }
    .empty-icon { font-size: 2rem; display: block; margin-bottom: 10px; opacity: 0.2; }

    @media (max-width: 560px) {
      .trips-header, .trip-row { grid-template-columns: 1fr 1fr 60px 64px; }
      .trips-header > :nth-child(4), .trip-row > :nth-child(4) { display: none; }
    }
  </style>
</head>
<body>

<nav class="app-nav">
  <a href="/" class="nav-brand">
    <div class="nav-logo"><i class="fas fa-route"></i></div>
    Mileage Tracker
  </a>
  <div class="nav-right">
    <div class="user-chip">
      <div class="user-avatar">{{ username[0]|upper }}</div>
      {{ username }}
    </div>
    <a href="/logout" class="logout-link">Sign Out</a>
  </div>
</nav>

<div class="page">

  <!-- Log a Trip -->
  <div class="panel">
    <div class="panel-heading">
      <div class="panel-heading-icon"><i class="fas fa-map-marker-alt"></i></div>
      Log a Trip
    </div>

    <div style="margin-bottom:16px">
      <label class="field-label" for="start">Start Location</label>
      <div class="autocomplete-wrapper">
        <div class="input-row">
          <span class="loc-icon"><i class="fas fa-circle" style="color:#10B981;font-size:.45rem"></i></span>
          <input type="text" id="start" class="loc-input" placeholder="Where are you starting?" autocomplete="off">
          <button class="mic-btn" type="button" id="voiceStart" title="Voice input">
            <i class="fas fa-microphone"></i>
          </button>
        </div>
        <div class="autocomplete-dropdown d-none" id="startDropdown"></div>
      </div>
      <div class="confirm-bar" id="startConfirmBar">
        <i class="fas fa-map-marker-alt" style="color:#F59E0B;flex-shrink:0;font-size:.8rem"></i>
        <span class="confirm-text" id="startConfirmText"></span>
        <button class="confirm-yes" id="startConfirmYes">&#10003; Correct</button>
        <button class="confirm-edit" id="startConfirmEdit">&#9998; Edit</button>
      </div>
    </div>

    <div class="route-divider"><i class="fas fa-arrow-down"></i></div>

    <div>
      <label class="field-label" for="end">End Location</label>
      <div class="autocomplete-wrapper">
        <div class="input-row">
          <span class="loc-icon"><i class="fas fa-map-marker-alt" style="color:#EF4444;font-size:.75rem"></i></span>
          <input type="text" id="end" class="loc-input" placeholder="Where are you going?" autocomplete="off">
          <button class="mic-btn" type="button" id="voiceEnd" title="Voice input">
            <i class="fas fa-microphone"></i>
          </button>
        </div>
        <div class="autocomplete-dropdown d-none" id="endDropdown"></div>
      </div>
      <div class="confirm-bar" id="endConfirmBar">
        <i class="fas fa-map-marker-alt" style="color:#F59E0B;flex-shrink:0;font-size:.8rem"></i>
        <span class="confirm-text" id="endConfirmText"></span>
        <button class="confirm-yes" id="endConfirmYes">&#10003; Correct</button>
        <button class="confirm-edit" id="endConfirmEdit">&#9998; Edit</button>
      </div>
    </div>

    <button id="calculateBtn" class="btn-calc">
      <i class="fas fa-route"></i> Calculate Distance
    </button>

    <div id="resultPanel" class="d-none">
      <div class="result-label">Driving Distance</div>
      <div><span class="result-number" id="resultMiles"></span> <span class="result-unit">mi</span></div>
      <div class="result-route" id="resultRoute"></div>
      <button id="logBtn" class="btn-log">
        <i class="fas fa-plus-circle"></i> Log This Trip
      </button>
    </div>

    <div id="errorAlert" class="alert-strip alert-err d-none">
      <i class="fas fa-exclamation-circle"></i>
      <span id="errorMsg"></span>
      <button class="alert-close" id="errorClose"><i class="fas fa-times"></i></button>
    </div>

    <div id="successAlert" class="alert-strip alert-ok d-none">
      <i class="fas fa-check-circle"></i> Trip logged successfully!
    </div>
  </div>

  <!-- Stats Summary -->
  <div class="stats-bar d-none" id="statsBar">
    <div class="stat-item">
      <div class="stat-value" id="statTotalMiles">0</div>
      <div class="stat-label">Total Miles</div>
    </div>
    <div class="stat-divider"></div>
    <div class="stat-item">
      <div class="stat-value" id="statTripCount">0</div>
      <div class="stat-label">Trips Logged</div>
    </div>
  </div>

  <!-- Trip History -->
  <div class="panel">
    <div class="history-top">
      <div class="panel-heading" style="margin-bottom:0">
        <div class="panel-heading-icon"><i class="fas fa-history"></i></div>
        Trip History
      </div>
      <div class="export-btns d-none" id="exportBtns">
        <button class="export-btn" onclick="exportPDF()" title="Export as PDF">
          <i class="fas fa-file-pdf"></i><span class="export-label"> PDF</span>
        </button>
        <button class="export-btn" onclick="exportExcel()" title="Export as Excel (.xlsx)">
          <i class="fas fa-file-excel"></i><span class="export-label"> Excel</span>
        </button>
        <button class="export-btn" onclick="exportCSV()" title="Export as CSV">
          <i class="fas fa-file-csv"></i><span class="export-label"> CSV</span>
        </button>
      </div>
    </div>

    <div id="historyWrap">
      <div class="history-empty" id="emptyState">
        <span class="empty-icon"><i class="fas fa-route"></i></span>
        No trips logged yet. Calculate your first trip above!
      </div>
    </div>
  </div>

</div>

<!-- Edit trip modal -->
<div class="modal-overlay" id="editModal">
  <div class="modal-box">
    <div class="modal-header">
      <div class="modal-title"><i class="fas fa-pencil-alt" style="color:var(--primary)"></i> Edit Trip</div>
      <button class="modal-close" onclick="closeEditModal()"><i class="fas fa-times"></i></button>
    </div>
    <div class="modal-field">
      <label>Start Location</label>
      <div class="autocomplete-wrapper">
        <input type="text" id="editStart" autocomplete="off" placeholder="Start location">
        <div class="autocomplete-dropdown d-none" id="editStartDropdown"></div>
      </div>
    </div>
    <div class="modal-field">
      <label>End Location</label>
      <div class="autocomplete-wrapper">
        <input type="text" id="editEnd" autocomplete="off" placeholder="End location">
        <div class="autocomplete-dropdown d-none" id="editEndDropdown"></div>
      </div>
    </div>
    <div style="font-size:.73rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px">Distance</div>
    <div class="modal-dist-row">
      <div class="modal-miles-box"><span id="editMiles">—</span> miles</div>
      <button class="btn-recalc" id="recalcBtn" onclick="recalcEditDistance()">
        <i class="fas fa-route"></i> Recalculate
      </button>
    </div>
    <div class="modal-footer">
      <button class="btn-modal-cancel" onclick="closeEditModal()">Cancel</button>
      <button class="btn-modal-save" id="saveEditBtn" onclick="saveEdit()">Save Changes</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
// ─── Autocomplete ─────────────────────────────────────────────────────────

function setupAutocomplete(inputId, dropdownId) {
  const input = document.getElementById(inputId);
  const dropdown = document.getElementById(dropdownId);
  let debounceTimer = null;

  input.addEventListener('input', () => {
    clearTimeout(debounceTimer);
    const q = input.value.trim();
    if (q.length < 3) { hideDropdown(dropdown); return; }
    debounceTimer = setTimeout(() => fetchSuggestions(q, input, dropdown), 500);
  });

  input.addEventListener('keydown', (e) => {
    const items = dropdown.querySelectorAll('.autocomplete-item');
    const active = dropdown.querySelector('.autocomplete-item.active');
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      const next = active ? active.nextElementSibling : items[0];
      if (next) { active && active.classList.remove('active'); next.classList.add('active'); }
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      const prev = active ? active.previousElementSibling : items[items.length - 1];
      if (prev) { active && active.classList.remove('active'); prev.classList.add('active'); }
    } else if (e.key === 'Enter' && active) {
      e.preventDefault();
      input.value = active.dataset.label;
      hideDropdown(dropdown);
    } else if (e.key === 'Escape') {
      hideDropdown(dropdown);
    }
  });

  document.addEventListener('click', (e) => {
    if (!input.contains(e.target) && !dropdown.contains(e.target)) hideDropdown(dropdown);
  });
}

function fetchSuggestions(query, input, dropdown) {
  const url = `https://nominatim.openstreetmap.org/search?format=jsonv2&q=${encodeURIComponent(query)}&limit=6&addressdetails=1`;
  fetch(url, { headers: { 'Accept-Language': 'en' } })
    .then(r => r.json())
    .then(data => {
      if (!data.length) { hideDropdown(dropdown); return; }
      dropdown.innerHTML = '';
      data.forEach(result => {
        const a = result.address || {};
        const road = a.road || a.pedestrian || a.footway || a.path;
        const street = [a.house_number, road].filter(Boolean).join(' ');
        const parts = [
          street,
          a.city || a.town || a.village || a.municipality || a.suburb,
          a.state,
          a.country
        ].filter(Boolean);
        const label = parts.length >= 2 ? parts.join(', ') : result.display_name;
        const item = document.createElement('div');
        item.className = 'autocomplete-item';
        item.textContent = label;
        item.dataset.label = label;
        item.addEventListener('mousedown', (e) => {
          e.preventDefault();
          input.value = label;
          hideDropdown(dropdown);
        });
        dropdown.appendChild(item);
      });
      dropdown.classList.remove('d-none');
    })
    .catch(() => hideDropdown(dropdown));
}

function hideDropdown(dropdown) {
  dropdown.classList.add('d-none');
  dropdown.innerHTML = '';
}

setupAutocomplete('start', 'startDropdown');
setupAutocomplete('end', 'endDropdown');


// ─── Voice input ──────────────────────────────────────────────────────────

function setupVoice(buttonId, inputId, confirmBarId, confirmTextId, confirmYesId, confirmEditId, dropdownId) {
  const btn         = document.getElementById(buttonId);
  const input       = document.getElementById(inputId);
  const bar         = document.getElementById(confirmBarId);
  const confirmText = document.getElementById(confirmTextId);
  const confirmYes  = document.getElementById(confirmYesId);
  const confirmEdit = document.getElementById(confirmEditId);
  const dropdown    = document.getElementById(dropdownId);

  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    btn.disabled = true;
    btn.title = 'Voice input not supported in this browser (try Chrome or Edge)';
    return;
  }

  const recognition = new SpeechRecognition();
  recognition.lang = 'en-US';
  recognition.interimResults = false;
  recognition.maxAlternatives = 1;

  btn.addEventListener('click', () => {
    btn.classList.add('recording');
    bar.classList.remove('show');
    recognition.start();
  });

  recognition.onresult = (event) => {
    const transcript = event.results[0][0].transcript;
    input.value = transcript;
    stopRecording();
    input.dispatchEvent(new Event('input'));

    const waitForClose = () => {
      if (!dropdown.classList.contains('d-none')) {
        setTimeout(waitForClose, 200);
      } else {
        showConfirmBar(input.value);
      }
    };
    setTimeout(waitForClose, 600);
  };

  recognition.onerror = (event) => {
    stopRecording();
    const msgs = {
      'not-allowed':    'Microphone access was denied. Click the lock icon in your browser's address bar and allow microphone access, then try again.',
      'no-speech':      'No speech detected. Please try again.',
      'audio-capture':  'No microphone found. Make sure one is connected.',
      'network':        'Network error during voice recognition. Try again.',
    };
    showError(msgs[event.error] || 'Voice input failed. Please type the address instead.');
  };
  recognition.onend = stopRecording;

  function stopRecording() { btn.classList.remove('recording'); }

  function showError(msg) {
    const err = document.createElement('div');
    err.textContent = msg;
    err.style.cssText = 'font-size:.8rem;color:#EF4444;margin-top:5px;';
    const existing = btn.parentElement.querySelector('.voice-err');
    if (existing) existing.remove();
    err.className = 'voice-err';
    btn.parentElement.appendChild(err);
    setTimeout(() => err.remove(), 5000);
  }

  function showConfirmBar(address) {
    if (!address.trim()) return;
    confirmText.textContent = address;
    bar.classList.add('show');
  }

  confirmYes.addEventListener('click', () => {
    input.classList.add('is-valid');
    bar.classList.remove('show');
  });

  confirmEdit.addEventListener('click', () => {
    bar.classList.remove('show');
    input.classList.remove('is-valid');
    input.focus();
    input.select();
  });

  input.addEventListener('input', () => {
    input.classList.remove('is-valid');
    bar.classList.remove('show');
  });
}

setupVoice('voiceStart', 'start', 'startConfirmBar', 'startConfirmText', 'startConfirmYes', 'startConfirmEdit', 'startDropdown');
setupVoice('voiceEnd',   'end',   'endConfirmBar',   'endConfirmText',   'endConfirmYes',   'endConfirmEdit',   'endDropdown');


// ─── Calculate ────────────────────────────────────────────────────────────

let lastResult = null;

document.getElementById('calculateBtn').addEventListener('click', async () => {
  const start = document.getElementById('start').value.trim();
  const end   = document.getElementById('end').value.trim();
  hideError();
  hideResult();

  if (!start || !end) { showError('Please enter both a start and end location.'); return; }

  const btn = document.getElementById('calculateBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span> Calculating…';

  try {
    const resp = await fetch('/calculate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ start, end })
    });
    const data = await resp.json();
    if (!resp.ok) { showError(data.error || 'Calculation failed.'); return; }

    lastResult = data;
    document.getElementById('resultMiles').textContent = data.distance_miles;
    document.getElementById('resultRoute').textContent = `${data.start} → ${data.end}`;
    document.getElementById('resultPanel').classList.remove('d-none');
  } catch {
    showError('Network error. Please check your connection and try again.');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<i class="fas fa-route"></i> Calculate Distance';
  }
});


// ─── Log trip ─────────────────────────────────────────────────────────────

document.getElementById('logBtn').addEventListener('click', async () => {
  if (!lastResult) return;
  const logBtn = document.getElementById('logBtn');
  logBtn.disabled = true;
  logBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span> Saving…';

  try {
    const resp = await fetch('/log', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(lastResult)
    });
    const data = await resp.json();
    if (!resp.ok) { showError(data.error || 'Failed to log trip.'); return; }

    hideResult();
    tripsData.unshift(data.trip);
    prependTripRow(data.trip);
    updateTotal(data.trip.miles, true);

    const ok = document.getElementById('successAlert');
    ok.classList.remove('d-none');
    setTimeout(() => ok.classList.add('d-none'), 3000);

    document.getElementById('start').value = '';
    document.getElementById('end').value = '';
    document.getElementById('start').classList.remove('is-valid');
    document.getElementById('end').classList.remove('is-valid');
    lastResult = null;
  } catch {
    showError('Network error. Could not save trip.');
  } finally {
    logBtn.disabled = false;
    logBtn.innerHTML = '<i class="fas fa-plus-circle"></i> Log This Trip';
  }
});


// ─── History ──────────────────────────────────────────────────────────────

let totalMilesAccum = 0;
let tripCount       = 0;
let tripsData       = [];
let headerInserted  = false;

async function loadHistory() {
  try {
    const resp  = await fetch('/history');
    const trips = await resp.json();
    if (!trips.length) return;

    document.getElementById('emptyState')?.remove();
    totalMilesAccum = 0;
    tripCount = trips.length;
    tripsData = [...trips];
    trips.forEach(t => { prependTripRow(t, false); totalMilesAccum += t.miles; });
    updateTotalDisplay();
  } catch { /* non-fatal */ }
}

function prependTripRow(trip, prepend = true) {
  document.getElementById('emptyState')?.remove();
  const wrap = document.getElementById('historyWrap');

  if (!headerInserted) {
    const hdr = document.createElement('div');
    hdr.className = 'trips-header';
    hdr.id = 'tripsHeader';
    hdr.innerHTML = '<span>Start</span><span>End</span><span>Miles</span><span>Date</span><span></span>';
    wrap.insertBefore(hdr, wrap.firstChild);
    headerInserted = true;
  }

  const row = document.createElement('div');
  row.className = 'trip-row';
  row.id = `trip-${trip.id}`;
  row.dataset.start = trip.start;
  row.dataset.end   = trip.end;
  row.dataset.miles = trip.miles;
  row.innerHTML = `
    <div class="trip-loc" title="${escHtml(trip.start)}">${escHtml(trip.start)}</div>
    <div class="trip-loc" title="${escHtml(trip.end)}">${escHtml(trip.end)}</div>
    <div class="trip-mi">${trip.miles}</div>
    <div class="trip-date">${escHtml(trip.timestamp)}</div>
    <div class="trip-actions">
      <button class="trip-edit" onclick="openEditModal(${trip.id})" title="Edit trip">
        <i class="fas fa-pencil-alt"></i>
      </button>
      <button class="trip-del" onclick="deleteTrip(${trip.id}, ${trip.miles})" title="Delete trip">
        <i class="fas fa-trash-alt"></i>
      </button>
    </div>
  `;

  const hdr = document.getElementById('tripsHeader');
  if (prepend && hdr) {
    hdr.insertAdjacentElement('afterend', row);
  } else {
    wrap.appendChild(row);
  }
}

async function deleteTrip(id, miles) {
  if (!confirm('Delete this trip?')) return;
  try {
    const resp = await fetch(`/history/${id}`, { method: 'DELETE' });
    if (!resp.ok) return;
    document.getElementById(`trip-${id}`).remove();
    tripsData = tripsData.filter(t => t.id !== id);
    updateTotal(miles, false);

    const wrap = document.getElementById('historyWrap');
    if (!wrap.querySelector('.trip-row')) {
      document.getElementById('tripsHeader')?.remove();
      headerInserted = false;
      wrap.innerHTML = `
        <div class="history-empty" id="emptyState">
          <span class="empty-icon"><i class="fas fa-route"></i></span>
          No trips logged yet. Calculate your first trip above!
        </div>
      `;
    }
  } catch { /* silent */ }
}

function updateTotal(miles, add) {
  totalMilesAccum = add ? totalMilesAccum + miles : totalMilesAccum - miles;
  tripCount       = add ? tripCount + 1 : tripCount - 1;
  updateTotalDisplay();
}

function updateTotalDisplay() {
  const bar = document.getElementById('statsBar');
  const btns = document.getElementById('exportBtns');
  if (tripCount > 0) {
    document.getElementById('statTotalMiles').textContent =
      (Math.round(totalMilesAccum * 100) / 100).toLocaleString();
    document.getElementById('statTripCount').textContent = tripCount;
    bar.classList.remove('d-none');
    btns.classList.remove('d-none');
  } else {
    bar.classList.add('d-none');
    btns.classList.add('d-none');
  }
}


// ─── Helpers ──────────────────────────────────────────────────────────────

function showError(msg) {
  const el = document.getElementById('errorAlert');
  document.getElementById('errorMsg').textContent = msg;
  el.classList.remove('d-none');
}
function hideError()  { document.getElementById('errorAlert').classList.add('d-none'); }
function hideResult() { document.getElementById('resultPanel').classList.add('d-none'); }

function escHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

document.getElementById('errorClose').addEventListener('click', hideError);


// ─── Edit modal ───────────────────────────────────────────────────────────

let editingTrip = null;

function openEditModal(id) {
  const row = document.getElementById(`trip-${id}`);
  editingTrip = { id, miles: parseFloat(row.dataset.miles) };
  document.getElementById('editStart').value = row.dataset.start;
  document.getElementById('editEnd').value   = row.dataset.end;
  document.getElementById('editMiles').textContent = row.dataset.miles;
  document.getElementById('editModal').classList.add('open');
}

function closeEditModal() {
  document.getElementById('editModal').classList.remove('open');
  editingTrip = null;
}

document.getElementById('editModal').addEventListener('click', (e) => {
  if (e.target === document.getElementById('editModal')) closeEditModal();
});

async function recalcEditDistance() {
  const start = document.getElementById('editStart').value.trim();
  const end   = document.getElementById('editEnd').value.trim();
  if (!start || !end) return;
  const btn = document.getElementById('recalcBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Calculating…';
  try {
    const resp = await fetch('/calculate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ start, end })
    });
    const data = await resp.json();
    if (resp.ok) {
      editingTrip.miles = data.distance_miles;
      document.getElementById('editMiles').textContent = data.distance_miles;
    }
  } catch { /* silent */ }
  finally {
    btn.disabled = false;
    btn.innerHTML = '<i class="fas fa-route"></i> Recalculate';
  }
}

async function saveEdit() {
  if (!editingTrip) return;
  const start = document.getElementById('editStart').value.trim();
  const end   = document.getElementById('editEnd').value.trim();
  if (!start || !end) return;
  const btn = document.getElementById('saveEditBtn');
  btn.disabled = true;
  btn.textContent = 'Saving…';
  try {
    const resp = await fetch(`/history/${editingTrip.id}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ start, end, distance_miles: editingTrip.miles })
    });
    const data = await resp.json();
    if (!resp.ok) { alert(data.error || 'Failed to save.'); return; }

    const row = document.getElementById(`trip-${data.id}`);
    const oldMiles = parseFloat(row.dataset.miles);
    row.dataset.start = data.start;
    row.dataset.end   = data.end;
    row.dataset.miles = data.miles;
    row.children[0].textContent = data.start; row.children[0].title = data.start;
    row.children[1].textContent = data.end;   row.children[1].title = data.end;
    row.children[2].textContent = data.miles;
    row.querySelector('.trip-del').setAttribute('onclick', `deleteTrip(${data.id}, ${data.miles})`);

    const idx = tripsData.findIndex(t => t.id === data.id);
    if (idx !== -1) {
      tripsData[idx] = { ...tripsData[idx], start: data.start, end: data.end, miles: data.miles };
      totalMilesAccum = totalMilesAccum - oldMiles + data.miles;
      updateTotalDisplay();
    }
    closeEditModal();
  } catch { alert('Network error. Could not save changes.'); }
  finally { btn.disabled = false; btn.textContent = 'Save Changes'; }
}

setupAutocomplete('editStart', 'editStartDropdown');
setupAutocomplete('editEnd',   'editEndDropdown');

loadHistory();


// ─── Export ───────────────────────────────────────────────────────────────

function exportCSV() {
  const rows = [['Start Location', 'End Location', 'Miles', 'Date']];
  tripsData.forEach(t => rows.push([t.start, t.end, t.miles, t.timestamp]));
  rows.push(['', 'TOTAL', (Math.round(totalMilesAccum * 100) / 100), '']);
  const csv = rows.map(r =>
    r.map(c => `"${String(c ?? '').replace(/"/g, '""')}"`).join(',')
  ).join('\r\n');
  triggerDownload('mileage-log.csv', 'text/csv;charset=utf-8;', csv);
}

function exportExcel() {
  const rows = [['Start Location', 'End Location', 'Miles', 'Date']];
  tripsData.forEach(t => rows.push([t.start, t.end, t.miles, t.timestamp]));
  rows.push(['', 'TOTAL', Math.round(totalMilesAccum * 100) / 100, '']);

  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.aoa_to_sheet(rows);
  ws['!cols'] = [{ wch: 36 }, { wch: 36 }, { wch: 10 }, { wch: 22 }];
  XLSX.utils.book_append_sheet(wb, ws, 'Mileage Log');
  XLSX.writeFile(wb, 'mileage-log.xlsx');
}

function exportPDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  doc.setFontSize(16);
  doc.setTextColor(79, 70, 229);
  doc.text('Mileage Log', 14, 18);

  doc.setFontSize(9);
  doc.setTextColor(100, 116, 139);
  doc.text(`Exported on ${new Date().toLocaleDateString()}  ·  ${tripCount} trips  ·  ${(Math.round(totalMilesAccum * 100) / 100).toLocaleString()} mi total`, 14, 25);

  doc.autoTable({
    startY: 30,
    head: [['Start Location', 'End Location', 'Miles', 'Date']],
    body: tripsData.map(t => [t.start, t.end, t.miles, t.timestamp]),
    foot: [['', 'Total', Math.round(totalMilesAccum * 100) / 100, '']],
    headStyles:  { fillColor: [79, 70, 229], fontSize: 8, fontStyle: 'bold' },
    footStyles:  { fillColor: [238, 242, 255], textColor: [79, 70, 229], fontStyle: 'bold', fontSize: 8 },
    bodyStyles:  { fontSize: 8 },
    columnStyles: { 2: { halign: 'right' } },
    alternateRowStyles: { fillColor: [248, 250, 252] },
    margin: { left: 14, right: 14 },
  });

  doc.save('mileage-log.pdf');
}

function triggerDownload(filename, type, content) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([content], { type }));
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(a.href);
}


</script>
